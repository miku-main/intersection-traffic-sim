<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Intersection Simulator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Traffic Intersection Simulator</h1>
    </header>

    <main class="layout">
        <section class="panel">
            <canvas id="simCanvas" width="900" height="600"></canvas>
        </section>

        <aside class="sidebar">
            <div class="card">
                <h2>Controls</h2>
                <div class="row">
                    <button id="btnStart">Start</button>
                    <button id="btnPause">Pause</button>
                    <button id="btnReset">Reset</button>
                </div>
            </div>

            <div class="card">
                <h2>Signal Timing (seconds)</h2>
                <label>NS Green <input id="nsGreen" type="number" min="5" max="120" value="20"></label>
                <label>EW Green <input id="ewGreen" type="number" min="5" max="120" value="20"></label>
                <label>Yellow <input id="yellow" type="number" min="1" max="10" value="2"></label>
                <label>All-Red <input id="allRed" type="number" min="0" max="10" value="1"></label>
            </div>

            <div class="card">
                <h2>Arrivals (cars/min)</h2>
                <label>N <input id="arrN" type="number" min="0" max="120" value="10"></label>
                <label>E <input id="arrE" type="number" min="0" max="120" value="28"></label>
                <label>S <input id="arrS" type="number" min="0" max="120" value="10"></label>
                <label>W <input id="arrW" type="number" min="0" max="120" value="18"></label>
            </div>

            <div class="card">
                <h2>Flow</h2>
                <label>Headway (sec/car) <input id="headway" type="number" min="0.5" max="5" step="0.1" value="2.0"></label>
                <label>Seed <input id="seed" type="number" value="12345"></label>
                <button id="btnApply">Apply Settings</button>
            </div>

            <div class="card">
                <h2>Status</h2>
                <pre id="statusText"></pre>
            </div>
        </aside>
    </main>
    <script type="module" src="src/main.js"></script>
</body>
</html>
